<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 — 서진필터</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%231a2b4a'/><text y='72' x='50' text-anchor='middle' font-size='46' font-weight='bold' fill='white' font-family='sans-serif'>SF</text></svg>">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .not-found {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .not-found-icon { font-size: 4rem; margin-bottom: 16px; }
    .not-found h1 { font-size: 1.6rem; color: var(--color-primary); margin-bottom: 10px; }
    .not-found p { color: var(--color-text-sub); margin-bottom: 28px; }
    .not-found-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-icon">SF</span>
        <span>서진필터<br><span class="logo-sub">SEOJIN FILTER</span></span>
      </a>
      <nav class="site-nav">
        <a href="index.html#about">회사소개</a>
        <a href="products.html">제품</a>
        <a href="portfolio.html">납품실적</a>
        <a href="inquiry.html" class="nav-cta">견적 문의</a>
      </nav>
    </div>
  </div>
</header>

<div class="not-found">
  <div>
    <div class="not-found-icon" style="font-size:3rem;color:var(--color-accent);font-weight:800">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
    <div class="not-found-links">
      <a href="index.html" class="btn btn-primary">홈으로 이동</a>
      <a href="products.html" class="btn" style="border:1.5px solid var(--color-border);color:var(--color-text-sub)">제품 보기</a>
      <a href="inquiry.html" class="btn" style="border:1.5px solid var(--color-border);color:var(--color-text-sub)">견적 문의</a>
    </div>
  </div>
</div>

<script src="js/nav.js"></script>
</body>
</html>
